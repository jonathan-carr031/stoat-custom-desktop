# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev"]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore StoatBog.sln
    - name: Get next version
      uses: reecetech/version-increment@2024.10.1
      id: version
      with:
        scheme: semver
        increment: patch
    - name: Build
      run: dotnet build --no-restore StoatBog.sln -p:Version=${{steps.version.outputs.version}}
    - name: Test
      run: dotnet test --no-build --verbosity normal StoatBog.sln
    - name: Publish
      run: dotnet publish -r win-x64 -f net9.0 --self-contained true -c Release -p:Version=${{steps.version.outputs.version}} -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:PublishTrimmed=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -o publish/win-x64 "StoatBog.Desktop/StoatBog.Desktop.csproj"
    - name: Rename Executable
      run: ren "publish/win-x64/StoatBog.Desktop.exe" "StoatBog.exe"
    - name: Create Installer
      run: iscc /DMyAppVersion="${{steps.version.outputs.version}}" "StoatBogInstaller.iss"
      #      
    - name: Create Draft Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{steps.version.outputs.version}}
        release_name: v${{steps.version.outputs.version}}
        draft: true
        prerelease: false
    
    - uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./Output/StoatBog_win-x64-v${{steps.version.outputs.version}}.exe
        asset_name: StoatBog_win-x64-v${{steps.version.outputs.version}}.exe
        asset_content_type: application/exe

    - uses: eregon/publish-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        release_id: ${{ steps.create_release.outputs.id }}